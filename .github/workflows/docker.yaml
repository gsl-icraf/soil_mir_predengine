name: Docker Image CI for Soil Pred

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest #should be julia

    steps:
    - name: checkout code from current repo main/master branch
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
      
    - name: Run package check
      run: python3 deployment/prebuild_check.py

    - name: Set image meta attributes
      id: meta
      uses: docker/metadata-action@v3
      with:
        images: ${{ secrets.REGISTRY_USER }}/soil_mir_predengine
        # generate Docker tags based on the following events/attributes
        tags: |
          type=sha
          latest

    - name: Set up docker buildx (the engine that compile your image)
      uses: docker/setup-buildx-action@v3

    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.REGISTRY_URL }}
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    - name: Build and push to docker
      uses: docker/build-push-action@v6
      with:
        context: .
        file: deployment/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max